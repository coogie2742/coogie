
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle">Dark Mode</button>
        
        <div class="main-content">
            <!-- Lotto Section -->
            <div class="lotto-section">
                <h1>Lotto Number Generator</h1>
                <button id="generate">Generate Numbers</button>
                <div id="numbers" class="numbers-container"></div>
            </div>

            <!-- Contact Section -->
            <div class="contact-section">
                <h3>제휴 문의</h3>
                <form action="https://formspree.io/f/myklyqdn" method="POST" id="contact-form">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="성함 또는 업체명" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="_replyto" placeholder="이메일 주소" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="문의 내용을 입력해 주세요" required></textarea>
                    </div>
                    <button type="submit" id="submit-btn">문의하기</button>
                </form>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
